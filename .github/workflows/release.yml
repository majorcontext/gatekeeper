name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build from (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  image:
    name: Publish Gatekeeper Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/majorcontext/gatekeeper
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref }}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/gatekeeper/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
