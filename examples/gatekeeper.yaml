# Gate Keeper example configuration.
#
# The proxy injects credentials into matching HTTPS requests.
# Credentials are pre-configured below; the proxy resolves them
# at startup from environment variables, static values, or secrets.
#
# Usage:
#   export GITHUB_TOKEN="token ghp_yourtoken"  # full header value
#   ./run.sh                                   # builds + starts the proxy
#   export https_proxy=http://127.0.0.1:9080
#   curl https://api.github.com/user           # Authorization header injected

proxy:
  host: 127.0.0.1
  port: 9080

tls:
  ca_cert: ca.crt
  ca_key: ca.key

credentials:
  - host: api.github.com
    header: Authorization
    grant: github-api
    source:
      type: env
      var: GITHUB_TOKEN  # bare token (e.g. "ghp_...") — auth scheme auto-detected

  # For git clone/push over HTTPS, github.com requires HTTP Basic auth
  # with username "x-access-token". Set format: basic so gatekeeper
  # encodes the header as: Authorization: Basic base64(prefix:token)
  #
  # - host: github.com
  #   grant: github-git
  #   format: basic
  #   prefix: x-access-token
  #   source:
  #     type: env
  #     var: GITHUB_TOKEN

network:
  policy: permissive

log:
  level: info
  format: text
